{{- define "main" }}

{{- if (and site.Params.profileMode.enabled .IsHome) }}
{{- partial "index_profile.html" . }}
{{- end }}

{{- if .IsHome }}

<div class="scroll-arrow">
  <span></span>
</div>

{{- $projects := .Site.GetPage "/projects" }}
{{- if $projects }}
<section id="projects" class="home-projects">
  <div class="post-content md-content">
    {{ $projects.Content }}
  </div>
</section>
{{- end }}
{{- end }}

{{- end }}
